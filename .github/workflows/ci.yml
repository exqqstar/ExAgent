name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-core:
    name: Rust core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check core lint
        run: cargo clippy --package exagent --all-targets
      - name: Test core
        run: cargo test --package exagent --locked

  desktop-frontend:
    name: Desktop frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test frontend
        run: npm test
      - name: Build frontend
        run: npm run build

  desktop-tauri:
    name: Desktop Tauri
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci
      - name: Test Tauri package
        run: cargo test --package exagent-desktop --locked

  dependency-policy:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.7 --locked
      - name: Check Rust dependency policy
        run: cargo deny check licenses sources bans
